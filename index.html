        // Custom Toast Notification Function (Replaces alert)
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-green-600' : 'bg-red-500';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-circle-exclamation';

            toast.className = `${bgColor} text-white px-4 py-3 rounded shadow-lg flex items-center gap-3 toast-enter pointer-events-auto`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-lg"></i>
                <span class="text-sm font-medium flex-1">${message}</span>
            `;

            container.appendChild(toast);

            // Remove after 3 seconds
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);

                const textMessage = `Halo, saya tertarik untuk memesan produk ini:%0A%0A*${product.name}*%0AHarga: ${formatRupiah(product.price)}%0A%0AApakah stoknya masih tersedia?`;
                
                // Buka tab WhatsApp
                window.open(`https://wa.me/${phoneNumber}?text=${textMessage}`, '_blank');
            }
        }

        // --- Fitur Notifikasi --- //

        // 1. Menambah Notifikasi Baru
        function addNotification(title, message, image) {
            const newNotif = {
                id: Date.now(),
                title: title,
                message: message,
                image: image,
                time: "Baru saja",
                read: false
            };
            
            // Tambahkan ke urutan teratas
            notifications.unshift(newNotif);
            unreadCount++;
            
            // Update UI Badge
            updateNotificationBadge();
            // Update List di dalam Modal
            renderNotifications();
            // Munculkan Toast
            showToast(`Produk Baru: ${title}`, 'success');
        }

        // 2. Update Angka Badge Merah di Ikon Bawah
        function updateNotificationBadge() {
            const badge = document.getElementById('notif-badge');
            if (unreadCount > 0) {
                badge.innerText = unreadCount > 99 ? '99+' : unreadCount;
                badge.classList.remove('hidden');
                badge.classList.add('flex', 'items-center', 'justify-center');
            } else {
                badge.classList.add('hidden');
                badge.classList.remove('flex', 'items-center', 'justify-center');
            }
        }

        // 3. Render isi Daftar Notifikasi di Modal
        function renderNotifications() {
            const listContainer = document.getElementById('notification-list');
            
            if (notifications.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center text-gray-400 py-10 text-sm flex flex-col items-center justify-center h-full">
                        <i class="fa-regular fa-bell-slash text-4xl mb-2 text-gray-300"></i>
                        Belum ada notifikasi baru
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = '';
            notifications.forEach(notif => {
                const notifHTML = `
                    <div class="flex gap-3 p-3 border-b border-gray-100 hover:bg-gray-50 transition cursor-pointer ${notif.read ? 'opacity-60' : 'bg-orange-50/30'}">
                        <div class="w-12 h-12 rounded bg-gray-200 overflow-hidden flex-shrink-0">
                            <img src="${notif.image}" alt="notif img" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1">
                            <h4 class="text-sm font-bold text-gray-800 line-clamp-1">${notif.title}</h4>
                            <p class="text-xs text-gray-600 line-clamp-2 mt-0.5">${notif.message}</p>
                            <span class="text-[10px] text-gray-400 mt-1 block">${notif.time}</span>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += notifHTML;
            });
        }

        // 4. Logika Buka/Tutup Modal Notifikasi
        function toggleNotificationModal() {
            const modal = document.getElementById('notification-modal');
            const content = document.getElementById('notification-modal-content');
            
            if (modal.classList.contains('hidden')) {
                // Tampilkan Modal
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    // Reset styling untuk animasi masuk (berbeda di mobile vs desktop)
                    content.classList.remove('translate-y-full', 'md:scale-95');
                }, 10);
                
                // Tandai semua dibaca saat dibuka
                unreadCount = 0;
                notifications.forEach(n => n.read = true);
                updateNotificationBadge();
                renderNotifications(); // render ulang untuk mengubah background item menjadi "sudah dibaca"

            } else {
                // Sembunyikan Modal
                modal.classList.add('opacity-0');
                content.classList.add('translate-y-full', 'md:scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 300);
            }
        }

        // --- Fitur Filter Kategori --- //
        function filterByCategory(category) {
            const titleElement = document.getElementById('category-title');
            
            if (category === 'Semua') {
                renderProducts(products);
                titleElement.innerText = "Rekomendasi Alat Jahit";
            } else {
                const filtered = products.filter(p => p.category.toLowerCase() === category.toLowerCase());
                renderProducts(filtered);
                titleElement.innerText = `Kategori: ${category}`;
            }
        }

        // --- Simulasi Menambah Produk Baru --- //
        function simulateNewProductArrival() {
            const newProduct = {
                id: Date.now(),
                name: "Jarum Jahit Tangan Sharps Original (12 Bungkus)",
                category: "Jarum",
                originalPrice: 12350,
                price: 13000,
                discount: "",
                stock: 50,
                sold: 0,
                location: "Surabaya",
                image: "https://i.imgur.com/ZHCxJxg.png"
            };

            // Tambahkan ke array produk (di posisi paling atas/depan)
            products.unshift(newProduct);
            
            // Render ulang daftar produk di layar utama
            renderProducts(products);
            
            // Memicu notifikasi
            addNotification(
                newProduct.name, 
                `Produk baru telah ditambahkan ke katalog dengan harga ${formatRupiah(newProduct.price)}. Segera cek sekarang!`,
                newProduct.image
            );
        }

        // Location Modal Logic
        function toggleLocationModal() {
            const modal = document.getElementById('location-modal');
            const content = document.getElementById('location-modal-content');
            
            if (modal.classList.contains('hidden')) {
                // Tampilkan Modal
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    content.classList.remove('scale-95');
                }, 10);
            } else {
                // Sembunyikan Modal
                modal.classList.add('opacity-0');
                content.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 300);
            }
        }

        // Initial Render
        window.addEventListener('DOMContentLoaded', () => {
            renderProducts(products);

            // Simulasi: 5 Detik setelah web dibuka, otomatis ada produk baru ditambahkan
            setTimeout(() => {
                simulateNewProductArrival();
            }, 5000);
        });

    </script>
</body>
</html>
